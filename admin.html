<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><meta content="#0f4c5c" name="theme-color"/><title>ユーザー管理 | タクシー給与シミュレーター</title><link href="styles.css" rel="stylesheet"/></head>
<body class="admin-page auth-pending">
<section class="auth-gate" id="adminAuthGate"><div class="auth-card"><h1>ユーザー管理</h1><p id="adminMessage">管理者アカウントでログインしてください。</p><form class="auth-form" id="adminLoginForm"><label>メールアドレス<input id="adminEmail" required="" type="email"/></label><label>パスワード<input id="adminPassword" minlength="8" required="" type="password"/></label><button>ログイン</button></form><p><a href="index.html">アプリへ戻る</a></p></div></section>
<header class="app-header"><div><h1>登録ユーザー管理</h1><p>β版</p></div><div class="header-controls"><a class="ghost admin-link" href="index.html">アプリへ戻る</a><button class="ghost" id="adminLogout">ログアウト</button></div></header>
<main><section class="card"><div class="admin-summary"><div><span>登録ユーザー数</span><strong id="userCount">0人</strong></div><div><span>利用中</span><strong id="activeCount">0人</strong></div><div><span>利用停止</span><strong id="lockedCount">0人</strong></div></div><div class="code-admin-box"><h2>β版無料利用コード</h2><h3>新しいコードを発行</h3><p class="note">新規コードを発行します。既存コードは上書きしません。</p><form class="code-admin-form" id="codeForm"><label>新しい利用コード<input id="newAccessCode" minlength="8" required="" type="text"/></label><label>利用上限<input id="newAccessMaxUses" min="1" required="" step="1" type="number" value="3"/></label><button type="submit">新しいコードを発行</button></form><p class="note" id="codeStatus"></p><hr/><h3>既存コードの利用上限を変更</h3><p class="note">登録済み人数を維持したまま、利用上限だけを変更します。</p><form class="code-admin-form" id="limitForm"><label>現在の利用コード<input id="limitAccessCode" minlength="8" required="" type="text"/></label><label>新しい利用上限<input id="limitMaxUses" min="1" required="" step="1" type="number" value="10"/></label><button type="submit">利用上限を変更</button></form><p class="note" id="limitStatus"></p></div><div class="code-admin-box proxy-registration-box">
<h2>利用者代行登録</h2>
<p class="note">管理者が利用者のAuthenticationとFirestore利用者情報を同時に作成します。仮パスワードは利用者へ安全な方法で伝えてください。</p>
<form class="code-admin-form" id="proxyUserForm">
<label>氏名<input id="proxyName" maxlength="80" required type="text"/></label>
<label>メールアドレス<input id="proxyEmail" required type="email"/></label>
<label>仮パスワード<input id="proxyPassword" minlength="8" required type="text"/></label>
<label>無料利用コード<input id="proxyAccessCode" minlength="8" required type="text"/></label>
<button class="ghost" id="generateProxyPassword" type="button">仮パスワードを自動生成</button>
<button type="submit">利用者を代行登録</button>
</form>
<p class="note" id="proxyUserStatus"></p>
</div><p class="note" id="adminStatus"></p><div class="table-wrap"><table><thead><tr><th>氏名</th><th>メール</th><th>プラン</th><th>状態</th><th>登録日時</th><th>最終利用</th><th>操作</th></tr></thead><tbody id="usersBody"></tbody></table></div></section></main>
<script src="firebase-config.js"></script><script src="admin.js" type="module"></script></body></html>
